name: Lifesteal Stream Status Updater

on:
  schedule:
    # Runs automatically every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to trigger it manually via the GitHub interface

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Tracker Script
      run: python fetch_status.py

    - name: Commit and Push Status Update
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add status.json
        # Only commit if the status file actually changed
        git diff-index --quiet HEAD || git commit -m "Automated live status update [skip ci]"
        git push
