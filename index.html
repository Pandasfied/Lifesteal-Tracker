<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifesteal Live Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Lifesteal Status Hub</h1>
        <div class="counter-container">
            <div class="counter-badge badge-live">
                <span class="dot pulse-dot"></span> <span id="live-count">0</span> Live
            </div>
            <div class="counter-badge badge-offline">
                <span class="dot gray-dot"></span> <span id="offline-count">47</span> Offline
            </div>
        </div>
    </header>

    <main>
        <div id="player-grid" class="grid-container"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
